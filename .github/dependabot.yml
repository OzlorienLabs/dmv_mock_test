# Dependabot keeps dependencies up to date with weekly PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm packages (package.json / package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch minor + patch bumps into a single PR to cut down on noise;
      # major bumps still get their own PR so they can be reviewed carefully.
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
